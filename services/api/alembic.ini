[alembic]
script_location = migrations
prepend_sys_path = .
# Database URL is taken from CHESS_DATABASE_URL at runtime (see migrations/env.py).
# This placeholder is only used if the env var is unset.
sqlalchemy.url = postgresql+asyncpg://chess:chess@localhost:5432/chess

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
