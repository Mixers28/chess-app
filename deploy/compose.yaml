# Local + Coolify service definitions for the Chess App.
# Phase 1 needs only postgres; redis is included for Phase 4+ (multiplayer).
services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: chess
      POSTGRES_PASSWORD: chess
      POSTGRES_DB: chess
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U chess"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  chess-ai:
    build:
      context: ../services/ai
    environment:
      AI_ENVIRONMENT: local
      AI_STOCKFISH_PATH: /usr/games/stockfish
    expose:
      - "8001"
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8001"]
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import urllib.request; urllib.request.urlopen('http://localhost:8001/health')\""]
      interval: 5s
      timeout: 3s
      retries: 12
      start_period: 10s

  api:
    build:
      context: ../services/api
    environment:
      CHESS_ENVIRONMENT: local
      CHESS_DATABASE_URL: postgresql+asyncpg://chess:chess@postgres:5432/chess
      # CHESS_REDIS_URL: redis://redis:6379/0   # enable from Phase 4
      CHESS_AI_BASE_URL: http://chess-ai:8001
    depends_on:
      postgres:
        condition: service_healthy
      chess-ai:
        condition: service_healthy
    ports:
      - "8000:8000"
    # Migrations are an explicit, observable step before serving.
    command: >
      sh -c "alembic upgrade head &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000"
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health')\""]
      interval: 5s
      timeout: 3s
      retries: 12
      start_period: 15s

volumes:
  pgdata:
