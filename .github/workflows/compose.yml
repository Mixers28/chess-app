name: compose-e2e

on:
  push:
    paths:
      - "services/api/**"
      - "services/ai/**"
      - "deploy/**"
      - ".github/workflows/compose.yml"
  pull_request:
    paths:
      - "services/api/**"
      - "services/ai/**"
      - "deploy/**"
      - ".github/workflows/compose.yml"

jobs:
  integration:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build and start stack
        run: |
          docker compose -f deploy/compose.yaml up -d --build --wait
        # --wait polls each service's healthcheck before returning

      - name: Show service status
        if: always()
        run: docker compose -f deploy/compose.yaml ps

      - name: Run integration tests
        run: |
          python3 deploy/integration_test.py \
            http://localhost:8000 \
            http://localhost:8001

      - name: Dump logs on failure
        if: failure()
        run: |
          echo "=== api logs ===" && docker compose -f deploy/compose.yaml logs api
          echo "=== chess-ai logs ===" && docker compose -f deploy/compose.yaml logs chess-ai
          echo "=== postgres logs ===" && docker compose -f deploy/compose.yaml logs postgres

      - name: Tear down
        if: always()
        run: docker compose -f deploy/compose.yaml down -v
