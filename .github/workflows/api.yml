name: api

on:
  push:
    paths:
      - "services/api/**"
      - ".github/workflows/api.yml"
  pull_request:
    paths:
      - "services/api/**"
      - ".github/workflows/api.yml"

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/api
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e '.[dev]'
      - name: Lint
        run: ruff check .
      - name: Type check
        run: mypy app
      - name: Test
        run: pytest

  migrations:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/api
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: chess
          POSTGRES_PASSWORD: chess
          POSTGRES_DB: chess
        ports:
          - "5432:5432"
        options: >-
          --health-cmd "pg_isready -U chess"
          --health-interval 5s --health-timeout 3s --health-retries 10
    env:
      CHESS_DATABASE_URL: postgresql+asyncpg://chess:chess@localhost:5432/chess
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - run: pip install -e '.[dev]'
      - name: Upgrade then downgrade against a clean database
        run: |
          alembic upgrade head
          alembic downgrade base
